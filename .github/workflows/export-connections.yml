name: Export Connection

on:
  # Manual trigger (you can add schedule later)
  workflow_dispatch:
    inputs:
      out_path:
        description: "Path to write the JSON connections"
        required: false
        default: "connections/connections.dev.json"
      sanitize:
        description: "Remove potential secrets from output"
        required: false
        default: "true"

permissions:
  contents: write     # Needed so the bot can push the JSON file
  actions: read

jobs:
  export:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.repository_owner == github.actor
    env:
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
      ENV_ID:     ${{ secrets.ENV_ID }}
      TOKEN:      ${{ secrets.TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests
          sudo apt-get update && sudo apt-get install -y jq

      - name: Export connections to JSON
        run: |
          mkdir -p "$(dirname '${{ inputs.out_path }}')"
          python get_connections.py \
            --out "${{ inputs.out_path }}" \
            --rps 0.8 \
            $([[ "${{ inputs.sanitize }}" == "true" ]] && echo "--sanitize")

      - name: Add generated timestamp
        run: |
          ts="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          jq --arg ts "$ts" '. + {__workflow_generated_at_utc: $ts}' "${{ inputs.out_path }}" > tmp && mv tmp "${{ inputs.out_path }}"

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.out_path }}"
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(connections): update connections ($(date -u +'%Y-%m-%d'))"
            git push
          fi
